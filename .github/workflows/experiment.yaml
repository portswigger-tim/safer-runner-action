on:
  workflow_dispatch: {}

jobs:
  secure-runner:
    runs-on: ubuntu-latest
    steps:
    - run: |
        sudo apt-get install snort -y > /dev/null 2>&1
        sudo systemctl enable snort > /dev/null 2>&1
        sudo systemctl start snort
    - run: |
        echo "alert tcp $HOME_NET any -> any 22 (msg: “SSH Connection Attempts”; sid:100002; )" | sudo tee -a /etc/snort/rules/local.rules
        echo "alert udp $HOME_NET any -> any 53 (msg: “DNS Requests”; sid:100002; )" | sudo tee -a /etc/snort/rules/local.rules
        sudo systemctl reload snort

    - run: |
        ssh git@github.com || true
        dig portswigger.net
    - run: |
        sudo cat /var/log/snort/*
        journalctl -u snort

