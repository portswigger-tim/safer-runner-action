on:
  workflow_dispatch: {}

jobs:
  secure-runner:
    runs-on: ubuntu-latest
    steps:
    - run: |
        ip a sh eth0
        sudo apt-get install snort -y > /dev/null 2>&1
        sudo tee /etc/snort/snort.debian.conf > /dev/null << EOF
        DEBIAN_SNORT_STARTUP="boot"
        DEBIAN_SNORT_HOME_NET="10.0.0.0/8"
        DEBIAN_SNORT_OPTIONS=""
        DEBIAN_SNORT_INTERFACE="eth0"
        DEBIAN_SNORT_SEND_STATS="false"
        EOF
        sudo systemctl enable snort > /dev/null 2>&1
        sudo systemctl start snort
        sudo systemctl status snort
        sudo cat /etc/snort/snort.debian.conf
    - run: |
        echo "alert tcp any any <> any 22 (msg: “SSH Connection Attempts”; sid:9000001;)" | sudo tee -a /etc/snort/rules/local.rules
        echo "alert udp any any <> any 53 (msg: "DNS Request Detected"; sid:9000000;)" | sudo tee -a /etc/snort/rules/local.rules
        sudo systemctl reload snort
        sudo cat /etc/snort/rules/local.rules

    - run: |
        ssh git@github.com || true
        dig portswigger.net
        sleep 5
    - run: |
        sudo cat /var/log/snort/*

