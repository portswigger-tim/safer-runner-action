on:
  workflow_dispatch: {}

jobs:
  secure-runner:
    runs-on: ubuntu-latest
    steps:
    - run: |
        sudo apt-get install snort -y > /dev/null 2>&1
        sudo systemctl enable snort > /dev/null 2>&1
        sudo systemctl start snort
    - run: |
        echo "alert tcp any any <> any 22 (msg: “SSH Connection Attempts”; sid:100002;)" | sudo tee -a /etc/snort/rules/local.rules
        echo "alert udp any any <> any 53 (msg: "DNS Request Detected"; sid:9000000;)" | sudo tee -a /etc/snort/rules/local.rules
        sudo systemctl reload snort
        sudo cat /etc/snort/rules/local.rules

    - run: |
        ssh git@github.com || true
        dig portswigger.net
        sleep 5
    - run: |
        sudo cat /var/log/snort/*
        journalctl -u snort

