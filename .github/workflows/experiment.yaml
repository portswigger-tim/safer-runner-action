on:
  workflow_dispatch: {}

jobs:
  iptables:
    runs-on: ubuntu-latest
    steps:
    - run: |
        sudo iptables -A OUTPUT -m state --state NEW -j LOG --log-prefix='iptables_output'
    - run: |
        ssh git@github.com || true
        curl https://github.com
        dig portswigger.net
    - run: |
        grep iptables_output /var/log/syslog
  unbound:
    runs-on: ubuntu-latest
    steps:
    - run: |
        sudo apt-get install unbound -y
        
        sudo systemctl stop systemd-resolved
        sudo systemctl disable systemd-resolved
        sudo unlink /etc/resolv.conf

        sudo tee -a /etc/unbound/unbound.conf.d/server.conf > /dev/null <<EOF
        server:
          verbosity: 4
          log-tag-queryreply: yes
          log-replies: yes
          interface: 127.0.0.1
          access-control: 127.0.0.1/24 allow
          prefetch: yes
          server=1.1.1.3:853
          server=1.0.0.3:853
        EOF

        sudo systemctl start unbound-resolvconf
        sudo systemctl enable unbound
        sudo systemctl start unbound

    - run: |
        ssh git@github.com || true
        curl -I https://github.com
        dig portswigger.net
    - run: |
        journalctl -u unbound
